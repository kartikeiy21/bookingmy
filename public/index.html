<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concurrent Ticket Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=pro2" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar card">
        <div>
          <p class="eyebrow">Concurrent Booking Platform</p>
          <h1>Ticket Inventory Dashboard</h1>
          <p class="subtitle">Redis lock windows prevent double-booking during high concurrency.</p>
        </div>
        <div class="chip-group">
          <span class="chip available">Available</span>
          <span class="chip locked">Locked</span>
          <span class="chip mine">Locked by you</span>
          <span class="chip booked">Booked</span>
        </div>
      </header>

      <section class="top-grid">
        <section class="card controls">
          <div class="field-row">
            <label for="userId">User ID</label>
            <input id="userId" type="text" placeholder="e.g. user_42" />
          </div>

          <div class="actions">
            <button id="lockBtn">Lock Seats</button>
            <button id="confirmBtn" class="secondary">Confirm Booking</button>
            <button id="releaseBtn" class="ghost">Release Locks</button>
          </div>

          <p id="message" class="message"></p>
        </section>

        <section class="card stats" id="stats"></section>
      </section>

      <section class="card seat-card">
        <div class="seat-head">
          <div>
            <h2>Seat Map</h2>
            <p>Select seats, lock them, then confirm purchase.</p>
          </div>
          <div class="stage-pill">EVENT STAGE</div>
        </div>

        <div id="seatGrid" class="seat-grid"></div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
