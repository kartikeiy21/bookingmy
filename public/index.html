<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concurrent Ticket Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <main class="layout">
      <aside class="left-rail">
        <section class="card badge-card">
          <p class="eyebrow">Live Booking Engine</p>
          <h1>Stadium Seat Console</h1>
          <p>Atomic lock and confirm flow with Redis-backed concurrency safety.</p>
        </section>

        <section class="card controls">
          <label for="userId">Session User ID</label>
          <input id="userId" type="text" placeholder="e.g. user_42" />

          <div class="actions">
            <button id="lockBtn">Lock Seats</button>
            <button id="confirmBtn" class="secondary">Confirm</button>
            <button id="releaseBtn" class="ghost">Release</button>
          </div>

          <p id="message" class="message"></p>
        </section>

        <section class="card stats" id="stats"></section>
      </aside>

      <section class="right-stage">
        <div class="stage-top">
          <div class="pill available">Available</div>
          <div class="pill locked">Locked</div>
          <div class="pill mine">Locked by you</div>
          <div class="pill booked">Booked</div>
        </div>

        <section class="card seat-board">
          <div class="board-head">
            <h2>Seat Map</h2>
            <p>Select available seats, then lock and confirm.</p>
          </div>

          <div class="screen">EVENT STAGE</div>

          <div id="seatGrid" class="seat-grid"></div>
        </section>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
